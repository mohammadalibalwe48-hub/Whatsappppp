# Fly.io deploy config for the OtpWave API.
#
# Notes:
#  - The API holds long-lived Baileys WhatsApp sockets, so the machine MUST
#    stay running. We disable auto-stop and keep at least 1 machine up.
#  - Baileys auth state is persisted to /data/sessions via a Fly volume.
#    Without it, every restart forces users to re-pair their WhatsApp.
#  - Set runtime secrets with `fly secrets set --app otpwave-api ...`.
#
# See docs/DEPLOY_FLY.md for the full deploy walkthrough.

app = "otpwave-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  API_PORT = "4000"
  WHATSAPP_SESSIONS_DIR = "/data/sessions"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "otpwave_sessions"
  destination = "/data"
