# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Deploys all three OtpWave resources from this repo:
#   - otpwave-redis : managed Key Value (Redis-compatible) — Free plan
#   - otpwave-api   : Express + Baileys backend (Docker, Starter, 1 GB disk)
#   - otpwave-web   : Next.js dashboard (Docker, Starter)
#
# After the blueprint is applied, four env vars need to be filled in by hand
# (or via the API), because they cannot be derived inside the blueprint:
#
#   On otpwave-api:
#     - SUPABASE_URL                  (from Supabase Project Settings → API)
#     - SUPABASE_SERVICE_ROLE_KEY     (same place — keep secret!)
#     - API_CORS_ORIGINS              (set to the otpwave-web public URL)
#
#   On otpwave-web:
#     - NEXT_PUBLIC_SUPABASE_URL      (same project URL)
#     - NEXT_PUBLIC_SUPABASE_ANON_KEY (public key, safe to ship)
#     - NEXT_PUBLIC_API_URL           (set to the otpwave-api public URL)
#     - NEXT_PUBLIC_SITE_URL          (set to the otpwave-web public URL)
#
# SESSION_ENCRYPTION_KEY and WEBHOOK_SIGNING_PEPPER are auto-generated by
# Render on first apply.

services:
  # ---------------------------------------------------------------------------
  # Redis (Key Value) — used for OTP storage, rate limit windows, cooldowns.
  # ---------------------------------------------------------------------------
  - type: keyvalue
    name: otpwave-redis
    plan: free
    region: oregon
    ipAllowList: [] # private network only

  # ---------------------------------------------------------------------------
  # API — Express + Baileys WhatsApp gateway.
  # Needs a persistent disk for Baileys auth state so sessions survive deploys.
  # ---------------------------------------------------------------------------
  - type: web
    name: otpwave-api
    runtime: docker
    plan: starter
    region: oregon
    rootDir: api
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: sessions
      mountPath: /data/sessions
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: WHATSAPP_SESSIONS_DIR
        value: /data/sessions
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: otpwave-redis
          property: connectionString
      - key: API_CORS_ORIGINS
        sync: false # wire to the otpwave-web URL after first deploy
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SESSION_ENCRYPTION_KEY
        generateValue: true
      - key: WEBHOOK_SIGNING_PEPPER
        generateValue: true
      - key: OTP_DEFAULT_LENGTH
        value: "6"
      - key: OTP_DEFAULT_TTL_SECONDS
        value: "300"
      - key: OTP_MAX_ATTEMPTS
        value: "5"
      - key: OTP_RESEND_COOLDOWN_SECONDS
        value: "30"
      - key: RATE_LIMIT_SEND_PER_MIN
        value: "20"
      - key: RATE_LIMIT_VERIFY_PER_MIN
        value: "60"

  # ---------------------------------------------------------------------------
  # Web — Next.js dashboard. NEXT_PUBLIC_* vars must be set on the service so
  # Render passes them through to the Docker build as --build-args (declared
  # as ARG ... in web/Dockerfile) — Next.js inlines them into the bundle.
  # ---------------------------------------------------------------------------
  - type: web
    name: otpwave-web
    runtime: docker
    plan: starter
    region: oregon
    rootDir: web
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false # wire to the otpwave-api URL after first deploy
      - key: NEXT_PUBLIC_SITE_URL
        sync: false # this service's own URL after first deploy
