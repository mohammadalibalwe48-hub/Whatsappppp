# Fly.io deploy config for the OtpWave Next.js dashboard.
#
# Notes:
#  - The dashboard is stateless, so it's safe to scale to zero.
#  - NEXT_PUBLIC_* variables must be passed as Docker build args at deploy
#    time so Next.js inlines them into the client bundle. Example:
#
#      fly deploy --app otpwave-web --config web/fly.toml \
#        --build-arg NEXT_PUBLIC_SUPABASE_URL=...     \
#        --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=... \
#        --build-arg NEXT_PUBLIC_API_URL=https://otpwave-api.fly.dev \
#        --build-arg NEXT_PUBLIC_SITE_URL=https://otpwave-web.fly.dev
#
# See docs/DEPLOY_FLY.md for the full deploy walkthrough.

app = "otpwave-web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
